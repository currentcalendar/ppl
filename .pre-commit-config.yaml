repos:
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.3
    hooks:
      - id: bandit
        name: Bandit Security Linter
        args: ["-ll"]
        exclude: ^tests/

  - repo: https://github.com/returntocorp/semgrep
    rev: v1.152.0
    hooks:
      - id: semgrep
        name: Semgrep Security Scanner
        args: [
          "--config=p/python",
          "--config=p/security-audit",
          "--config=p/secrets",
          "--config=p/owasp-top-ten",
          "--error"
        ]