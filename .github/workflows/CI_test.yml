name: Test

on:
  push:
    branches: "**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: django_db
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: django_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set Up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies GeoDjango
      run: |
        sudo apt-get update
        sudo apt-get install -y binutils libproj-dev gdal-bin

    - name: Install dependencies Python
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Tests
      working-directory: ./backend
      env:
        DEBUG: "True"
        DJANGO_SECRET_KEY: "test-key-12345"
        POSTGRES_DB: django_db
        POSTGRES_USER: django_user
        POSTGRES_PASSWORD: django_password
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        GOOGLE_REDIRECT_URIS: localhost
        GOOGLE_CLIENT_ID: 'tu-client-id-de-google'
        GOOGLE_CLIENT_SECRET: 'tu-client-secret-de-google'
        GOOGLE_PROJECT_ID: 'tu-project-id-de-google'
        PYTHONPATH: .
      run: |
        coverage run manage.py test 

    - name: Generate summary report
      if: success() && github.ref == 'refs/heads/main'
      working-directory: ./backend
      run: |
        coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

    - name: Generate HTML report
      if: success() && github.ref == 'refs/heads/main'
      working-directory: ./backend
      run: |
        coverage html

    - name: Save HTML report as artifact
      if: success() && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: django-coverage-report
        path: backend/htmlcov/
        retention-days: 14

    - name: Generate XML report for SonarQube
      if: success() && github.ref == 'refs/heads/main'
      working-directory: ./backend
      run: |
        coverage xml

    - name: SonarQube Scan
      if: success() && github.ref == 'refs/heads/main'
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dproject.settings=sonar-project-actions.properties